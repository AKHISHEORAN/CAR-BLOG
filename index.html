<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoPulse India - Secure Admin Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

<!-- LOGIN -->
<div id="loginBox" class="text-center mt-20">
  <h2 class="text-2xl mb-4">Admin Login 🔐</h2>
  <input id="password" type="password" placeholder="Enter Password" class="p-2 text-black">
  <button onclick="login()" class="bg-red-500 px-4 py-2 ml-2">Login</button>
</div>

<!-- MAIN SITE -->
<div id="site" style="display:none;">

<!-- NAVBAR -->
<nav class="flex justify-between items-center p-5 bg-black">
  <h1 class="text-2xl font-bold text-red-500">AutoPulse India 🚗</h1>
</nav>

<!-- ADMIN PANEL (ONLY AFTER LOGIN) -->
<section class="p-6 bg-gray-800">
  <h2 class="text-xl mb-4">Add New Blog</h2>
  <input id="title" placeholder="Car Name" class="w-full mb-2 p-2 text-black">
  <input id="price" placeholder="Price" class="w-full mb-2 p-2 text-black">
  <input id="image" placeholder="Image URL" class="w-full mb-2 p-2 text-black">
  <textarea id="content" placeholder="Content" class="w-full mb-2 p-2 text-black"></textarea>
  <input id="link" placeholder="Affiliate Link" class="w-full mb-2 p-2 text-black">
  <button onclick="addBlog()" class="bg-red-500 px-4 py-2">Publish</button>
</section>

<!-- BLOGS -->
<section id="blogs" class="p-10 grid md:grid-cols-3 gap-6"></section>

</div>

<script>
let blogData = JSON.parse(localStorage.getItem('blogs')) || [];

function login() {
  const pass = document.getElementById('password').value;
  if(pass === "akhi@51") {
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('site').style.display = "block";
  } else {
    alert("Wrong password");
  }
}

function save() {
  localStorage.setItem('blogs', JSON.stringify(blogData));
}

function renderBlogs() {
  const container = document.getElementById('blogs');
  container.innerHTML = "";
  blogData.forEach((b,i)=>{
    container.innerHTML += `
      <div class="bg-gray-800 p-4 rounded">
        <img src="${b.image}" class="mb-2">
        <h3>${b.title}</h3>
        <p class="text-green-400">${b.price}</p>
        <button onclick="openBlog(${i})" class="mt-2 bg-red-500 px-2 py-1">Read</button>
      </div>`;
  });
}

function addBlog() {
  const blog = {
    title: title.value,
    price: price.value,
    image: image.value,
    content: content.value,
    link: link.value
  };
  blogData.unshift(blog);
  save();
  renderBlogs();
}

function openBlog(i) {
  alert(blogData[i].content);
}

renderBlogs();
</script>

</body>
</html>
